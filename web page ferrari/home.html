<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Animated Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <a href="home.html" class="active">Home</a>

                    </div>

                <div class="content">
                    <div class="title">FERRARI</div>
                    <div class="name">812SUPERFAST</div>

        </div>

        <div class="timeRunning">
        </div>

        <script src="app.js"></script>

</html>
