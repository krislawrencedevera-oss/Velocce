<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Ferrari</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #111;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .contact-container {
            margin: auto;
            max-width: 600px;
            width: 90%;
            padding: 40px;
            background: rgba(15, 15, 15, 0.8);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 20, 20, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            animation: fadeIn 1.5s ease-in-out;
            text-align: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .contact-title {
            font-size: 40px;
            color: #ff1414;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .contact-info {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .contact-form input:focus, .contact-form textarea:focus {
            border-color: #ff1414;
            box-shadow: 0 0 10px rgba(255, 20, 20, 0.5);
        }
        .contact-form textarea {
            resize: none;
            height: 120px;
        }
        .submit-btn {
            padding: 15px;
            background: #ff1414;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 18px;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 5px;
        }
        .submit-btn:hover {
            background: #cc0000;
            box-shadow: 0 0 15px #ff1414;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="home.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
        <img src="out-0.png" class="logo-top-right" alt="Logo">
    </header>

    <div class="contact-container">
        <div class="contact-title">Contact Us</div>
        <div class="contact-info">
            Via Abetone Inferiore N. 4<br>
            I-41053 Maranello (MO)<br>
            Phone: +39 0536 949111
        </div>
        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully!'); window.location.href='home.html';">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>
</body>
</html>
