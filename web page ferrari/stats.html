<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrari Stats</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 50px;
            border-radius: 20px;
            color: #fff;
            text-align: center;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 0 20px rgba(255, 20, 20, 0.5);
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
        .stats-title {
            font-size: 50px;
            color: #ff1414;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #ff1414;
            transition: 0.3s;
        }
        .stat-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }
        .stat-value {
            font-size: 30px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .stat-label {
            font-size: 14px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .back-btn, .order-btn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        .back-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
        }
        .back-btn:hover {
            background: #fff;
            color: #000;
        }
        .order-btn {
            background: #ff1414;
            color: #fff;
        }
        .order-btn:hover {
            background: #cc0000;
            box-shadow: 0 0 15px #ff1414;
        }
    </style>
</head>
<body id="stats-body" style="background-size: cover; background-position: center; height: 100vh; margin: 0; overflow: hidden; background-color: #111;">
    <header>
        <nav>
            <a href="home.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="stats-container">
        <h1 class="stats-title" id="car-title">Car Name</h1>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="top-speed">-- km/h</div>
                <div class="stat-label">Top Speed</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="zero-sixty">-- s</div>
                <div class="stat-label">0-100 km/h</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="horsepower">-- CV</div>
                <div class="stat-label">Horsepower</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="engine">--</div>
                <div class="stat-label">Engine</div>
            </div>
        </div>
        <button class="back-btn" onclick="window.location.href='home.html'">Back to Home</button>
        <button class="order-btn" id="order-btn-link">Customize & Order</button>
    </div>

    <script>
        const carData = {
            'amalfi': { name: 'Ferrari Amalfi', img: 'amalfi.jpg', speed: '320', zeroSixty: '3.4', hp: '620', engine: 'V8 Turbo' },
            'purosangue': { name: 'Ferrari Purosangue', img: 'ferrari-purosangue-1419550.jpg', speed: '310', zeroSixty: '3.3', hp: '725', engine: 'V12 naturally aspirated' },
            'laferrari': { name: 'LaFerrari', img: 'laferrari.jpg', speed: '350', zeroSixty: '2.6', hp: '963', engine: 'V12 Hybrid' },
            'sf90': { name: 'SF90 Stradale', img: 'sf90.jpg', speed: '340', zeroSixty: '2.5', hp: '1000', engine: 'V8 Hybrid' },
            '812': { name: '812 Superfast', img: '812.jpg', speed: '340', zeroSixty: '2.9', hp: '800', engine: 'V12 naturally aspirated' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('car') || 'purosangue';
        const car = carData[carId];

        if(car) {
            document.getElementById('stats-body').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('${car.img}')`;
            document.getElementById('car-title').innerText = car.name;
            document.getElementById('top-speed').innerText = `${car.speed} km/h`;
            document.getElementById('zero-sixty').innerText = `${car.zeroSixty} s`;
            document.getElementById('horsepower').innerText = `${car.hp} CV`;
            document.getElementById('engine').innerText = car.engine;
            document.getElementById('order-btn-link').onclick = () => window.location.href = `order.html?car=${carId}`;
        } else {
            document.getElementById('car-title').innerText = "Car Not Found";
        }
    </script>
</body>
</html>
